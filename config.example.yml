# All fields are optional, unless stated otherwise
# address to listen on, TCP addr with port, or a unix socket
# For unix socket, prefix it with 'unix://' or "unix:", e.g. "unix:///var/run/git-webhook-receiver.sock"
addr: 0.0.0.0:9090
# Public URL to use in the post output for pipeline url generation
# If not specified public url will be a combination of protocol + host + port
public_url: https://example.com:9090/ # default is empty, here only for example
log_level: "info" # other options are  'debug', 'warn' and 'error'
log_type: "json" # type of stdout log: "json" (default), "text"
disable_ui: false # Disable Web UI
disable_api: false # Disable Inspection HTTP API
auth_user: "admin" # Basic auth user for the inspection API and Web UI.
auth_password: "" # Basic auth password for the inspection API and Web UI. Empty string disables basicauth
auth_realm: "Git Webhook Receiver" # Basic auth realm shown in the browser credentials prompt
# SSL config: (optional, but recommended, unless you're using a reverse proxy)
ssl:
  cert_file_path: "./your/certfile/path/fullchain.pem"
  key_file_path: "/your/keyfile/path/privkey.pem"
# root-level environment: the base of the env hierarchy applied to every
# action of every project. Layered root -> project -> action, later levels may
# reference and override earlier ones. Same "KEY=VALUE" + interpolation rules as
# the per-action `environment` documented below. For security, environment
# entries are masked (like secrets) in logs, the API and the Web UI.
# environment:
#   - "REGISTRY=registry.example.com"
# root-level user: OS user every action runs as, unless a project or action
# overrides it (layered root -> project -> action). Empty = the receiver's user.
# Not supported on windows.
# user: deploy
projects:
  your_project_name:
    git_provider: github # "github" (default) | "gitea" | "gitlab"
    repo: "username/reponame" # REQUIRED repository full name, as displayed in the URL
    # please notice, it may be safer to keep secret and authorization tokens
    # in env variables, depending on your application deployment and setup
    # Generate one with `openssl rand -base64 18`
    secret: "YourSecretGoesHere" # your secret, used to sign the payload and validate it.
    # Please notice, github doesn't support this kind of auth, it's only for gitea/gitlab
    authorization: "JghYTd" # post authorization header contents, to authorize the incoming request
    # project-level environment: layered on top of the root env, forms the base
    # for this project's actions (may reference/override root entries).
    # environment:
    #   - "IMAGE=${REGISTRY}/${PROJECT_NAME}"
    # project-level user: overrides the root user for this project's actions,
    # itself overridable per action below.
    # user: www-data
    actions:
      # defaults to "push", use "*" to handle any event, or use a specific one, e.g. "release"
      - on: push
        # defaults to master, can be '*' to denote any; incoming branch name can be empty for tags or notes events
        branch: master
        # user from which action will be run, requires the elevated permissions, default to empty string
        user: www-data
        cwd: "/var/www/yourproject" # root dir in which action will be run, defaults to empty
        # create a fresh 0700 temp dir for this action, exposed as $TMPDIR,
        # removed once the action finishes (even on timeout/cancel, unlike an
        # in-script `trap EXIT`). Handy for clone-on-push deploys. When `user`
        # is set the dir is chowned to that user. `cwd` is also exposed as $CWD.
        # Defaults to false.
        with_temp_dir: false
        # extra environment variables injected into the action, on top of the
        # built-in (GIT_*, PROJECT_NAME, ...) and passed-through (HOME/USER/PATH)
        # ones, which they may override. Each VALUE supports shell-style env
        # interpolation resolved against this receiver process's environment:
        #   ${VAR}  ${VAR:-default}  ${VAR-default}  ${VAR:?err}  ${VAR?err}
        #   ${VAR:+replacement}  ${VAR+replacement}
        # environment:
        #   - "DEPLOY_TOKEN=${DEPLOY_TOKEN:?must be set in the receiver env}"
        #   - "NODE_ENV=production"
        #   - "CACHE_DIR=${HOME}/.cache/myproject"
        # each action MUST have either a `script` or `run` field (but not both):
        # To run a script:
        script: |
          git fetch && git reset --hard origin/master
          npm ci --ignore-scripts
          npm run build
        # or to execute a script or program:
        # run: ["node", "--version"]
        # per-action timeout, defaults to 0, meaning the global timeout value will be used
        timeout: 0s
        # per-action graceful shutdown timeout, defaults to 0, meaning the global value will be used
        graceful_shutdown: 0s
# pipeline results db filename, defaults to `actions.sqlite3` use empty string or null to disable
actions_db_file: "actions.sqlite3"
# application logs db filename, e.g. 'logs.sqlite3', defaults to "logs.sqlite3"
logs_db_file: "logs.sqlite3"
# max amount of actions to be stored in the actions DB. After exceeding this value,
# older entries will be deleted. Negative values disable this functionality
max_actions_stored: 1000
# global actions timeout. After this amount of seconds we're sending SIGINT on unix/SIGKILL on windows
# to the action process;
# must be a positive int, 0 will result in the default timeout value
actions_timeout: 10m
# global graceful shutdown duration AFTER the timeout value is reached. We're waiting for this amount of
# ms after timeout for the process to clean up and exit, otherwise we're hard killing it
actions_graceful_shutdown: 15s
# maximum size of the action output stored in the DB
# if an action output exceeds this limit it will fail, and its output will be truncated
# 0 means use the default value, negative values disable output restriction
max_output_bytes: 1048576
# Maximum amount of actions that can run concurrently
max_concurrent_actions: 8
